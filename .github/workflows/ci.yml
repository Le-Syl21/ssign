name: CI

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            lint: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: ${{ matrix.lint && 'rustfmt, clippy' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}

      # aarch64 Linux is cross-compiled from x86_64 (hosted arm runners are too
      # unstable for releases); cross-rs runs the build in a Docker image that
      # ships the aarch64 toolchain. ssign is pure Rust + rustls, so no system
      # packages are needed on any native target.
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      # --- Lint (linux-x86_64 only) ---
      - name: Check formatting
        if: matrix.lint
        run: cargo fmt --check

      - name: Clippy
        if: matrix.lint
        run: cargo clippy --release --target ${{ matrix.target }} -- -D warnings

      # --- Build ---
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      # Build the CLI and the PKCS#11 module. The module isn't a dependency of
      # the binary, so it has to be named explicitly or it won't be built.
      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p ssign -p ssign-pkcs11

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ssign -p ssign-pkcs11

      # Skip tests for cross-compiled targets (no aarch64 binary runs on the
      # x86_64 host) and the macOS x86_64 build (Apple-silicon runner).
      - name: Run tests
        if: matrix.target != 'x86_64-apple-darwin' && !matrix.cross
        run: cargo test --release --target ${{ matrix.target }}

      - name: Smoke test (--help runs)
        if: matrix.target != 'x86_64-apple-darwin' && !matrix.cross
        run: cargo run --release --target ${{ matrix.target }} -- --help

      # --- Apple signing & notarization (macOS, tags only) ---
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign binary (macOS)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application: Sylvain Gargasson ($APPLE_TEAM_ID)" \
            target/${{ matrix.target }}/release/ssign \
            target/${{ matrix.target }}/release/libssign_pkcs11.dylib

      - name: Notarize (macOS, tags only)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/notarize"
          cp target/${{ matrix.target }}/release/ssign \
             target/${{ matrix.target }}/release/libssign_pkcs11.dylib \
             "$RUNNER_TEMP/notarize/"
          ditto -c -k --keepParent "$RUNNER_TEMP/notarize" "$RUNNER_TEMP/ssign.zip"
          xcrun notarytool submit "$RUNNER_TEMP/ssign.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait

      # --- Package ---
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ssign-${{ matrix.label }}.tar.gz -C target/${{ matrix.target }}/release ssign

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/ssign.exe -DestinationPath ssign-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssign-${{ matrix.label }}
          path: ssign-${{ matrix.label }}.*

      # --- Package the PKCS#11 module (its own artifact) ---
      - name: Package module (Unix)
        if: runner.os != 'Windows'
        run: |
          lib=libssign_pkcs11.so
          [ "$RUNNER_OS" = macOS ] && lib=libssign_pkcs11.dylib
          tar czf ssign-pkcs11-${{ matrix.label }}.tar.gz -C target/${{ matrix.target }}/release "$lib"

      - name: Package module (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/ssign_pkcs11.dll -DestinationPath ssign-pkcs11-${{ matrix.label }}.zip

      - name: Upload module artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssign-pkcs11-${{ matrix.label }}
          path: ssign-pkcs11-${{ matrix.label }}.*

  # Sign the Windows binary with ssign itself (the Linux runner signs the Windows
  # .exe — dogfooding). Gated by the `signing` environment: the run pauses for
  # the owner's approval before it can read the Certum secrets and sign, and the
  # release below waits for it — so a tag becomes: build → approve → signed release.
  sign-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: signing
    steps:
      # Sign ourselves with the exact Linux binary just built in this run — no
      # recompile, and it dogfoods the very version being released.
      - name: Download the freshly built Linux ssign
        uses: actions/download-artifact@v8
        with:
          name: ssign-linux-x86_64
          path: linux
      - name: Install ssign
        run: |
          tar xzf linux/ssign-linux-x86_64.tar.gz -C linux
          sudo install -m755 linux/ssign /usr/local/bin/ssign

      - name: Download the Windows CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: ssign-windows-x86_64
          path: dl
      - name: Download the Windows module artifact
        uses: actions/download-artifact@v8
        with:
          name: ssign-pkcs11-windows-x86_64
          path: dl

      - name: Sign the Windows binary + module with ssign (via Certum)
        env:
          CERTUM_EMAIL: ${{ secrets.CERTUM_EMAIL }}
          CERTUM_OTP: ${{ secrets.CERTUM_OTP }}
        run: |
          unzip -o dl/ssign-windows-x86_64.zip -d dl
          unzip -o dl/ssign-pkcs11-windows-x86_64.zip -d dl
          # One Certum login signs both the CLI and the module.
          ssign --verbose \
            -n "ssign" -u "https://github.com/${{ github.repository }}" \
            dl/ssign.exe dl/ssign_pkcs11.dll
          sudo apt-get update -qq && sudo apt-get install -y osslsigncode
          for f in ssign.exe ssign_pkcs11.dll; do
            osslsigncode verify "dl/$f" 2>&1 | tee "verify-$f.txt" || true
            grep -q "Calculated message digest" "verify-$f.txt"
          done
          (cd dl && rm -f ssign-windows-x86_64.zip && zip -j ssign-windows-x86_64.zip ssign.exe)
          (cd dl && rm -f ssign-pkcs11-windows-x86_64.zip && zip -j ssign-pkcs11-windows-x86_64.zip ssign_pkcs11.dll)

      - name: Re-upload the signed Windows CLI
        uses: actions/upload-artifact@v7
        with:
          name: ssign-windows-x86_64
          path: dl/ssign-windows-x86_64.zip
          overwrite: true
      - name: Re-upload the signed Windows module
        uses: actions/upload-artifact@v7
        with:
          name: ssign-pkcs11-windows-x86_64
          path: dl/ssign-pkcs11-windows-x86_64.zip
          overwrite: true

  release:
    needs: [build, sign-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      # Download outside the repo working tree so `cargo publish` sees a clean tree.
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          # Tags pré-release (v*-rc/-beta) marqués « pre-release » dans l'UI GitHub.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ runner.temp }}/artifacts/**/*

      - name: Publish to crates.io
        # Pas de publish crates.io sur les pré-releases (v*-rc/-beta) : un publish est
        # définitif. Ces tags ne produisent que binaires signés + Release GitHub.
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          # Publish a crate, tolerating "already exists" (re-tag) but failing on
          # any other error. ssign-pkcs11 is publish=false, so it's skipped.
          publish() {
            if cargo publish -p "$1" 2>&1 | tee /tmp/publish.log; then
              return 0
            elif grep -q "already exists" /tmp/publish.log; then
              echo "$1: this version is already on crates.io — nothing to do"
              return 0
            else
              return 1
            fi
          }
          # The library first; the binary depends on it.
          publish ssign-core || exit 1
          # Wait for the index to catch up before publishing the dependent binary.
          for i in $(seq 1 10); do
            publish ssign && exit 0
            echo "index not ready, retrying in 30s… ($i/10)"
            sleep 30
          done
          echo "failed to publish ssign" >&2
          exit 1
