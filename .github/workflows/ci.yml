name: CI

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            lint: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: ${{ matrix.lint && 'rustfmt, clippy' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}

      # aarch64 Linux is cross-compiled from x86_64 (hosted arm runners are too
      # unstable for releases); cross-rs runs the build in a Docker image that
      # ships the aarch64 toolchain. ssign is pure Rust + rustls, so no system
      # packages are needed on any native target.
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      # --- Lint (linux-x86_64 only) ---
      - name: Check formatting
        if: matrix.lint
        run: cargo fmt --check

      - name: Clippy
        if: matrix.lint
        run: cargo clippy --release --target ${{ matrix.target }} -- -D warnings

      # --- Build ---
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      # Build the CLI and the PKCS#11 module. The module isn't a dependency of
      # the binary, so it has to be named explicitly or it won't be built.
      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p ssign -p ssign-pkcs11

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ssign -p ssign-pkcs11

      # Skip tests for cross-compiled targets (no aarch64 binary runs on the
      # x86_64 host) and the macOS x86_64 build (Apple-silicon runner).
      - name: Run tests
        if: matrix.target != 'x86_64-apple-darwin' && !matrix.cross
        run: cargo test --release --target ${{ matrix.target }}

      - name: Smoke test (--help runs)
        if: matrix.target != 'x86_64-apple-darwin' && !matrix.cross
        run: cargo run --release --target ${{ matrix.target }} -- --help

      # --- Package (binaires non signés ; la signature Apple est faite plus bas,
      # dans un job dédié derrière l'environnement `signing`). ---
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ssign-${{ matrix.label }}.tar.gz -C target/${{ matrix.target }}/release ssign

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/ssign.exe -DestinationPath ssign-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssign-${{ matrix.label }}
          path: ssign-${{ matrix.label }}.*

      # --- Package the PKCS#11 module (its own artifact) ---
      - name: Package module (Unix)
        if: runner.os != 'Windows'
        run: |
          lib=libssign_pkcs11.so
          [ "$RUNNER_OS" = macOS ] && lib=libssign_pkcs11.dylib
          tar czf ssign-pkcs11-${{ matrix.label }}.tar.gz -C target/${{ matrix.target }}/release "$lib"

      - name: Package module (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/ssign_pkcs11.dll -DestinationPath ssign-pkcs11-${{ matrix.label }}.zip

      - name: Upload module artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssign-pkcs11-${{ matrix.label }}
          path: ssign-pkcs11-${{ matrix.label }}.*

  # Signature + notarisation Apple. Derrière `signing` au même titre que Windows :
  # une signature Developer ID engage l'identité (et donc la réputation) du
  # propriétaire, elle ne doit jamais partir sans approbation explicite. Les
  # secrets Apple vivent dans cet environnement — un job qui ne le déclare pas
  # les lirait vides.
  sign-apple:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    environment: signing
    steps:
      # Attrape les quatre artefacts macOS : CLI + module PKCS#11, pour les deux
      # architectures.
      - name: Download the macOS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ssign-*macos-*
          path: dl

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign & notarize the macOS binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Soumission + attente, avec timeout et jusqu'à 3 tentatives (5/15/45 min).
          notarize_once() {
            local zip="$1" timeout="$2"
            local output
            output=$(xcrun notarytool submit "$zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --verbose 2>&1)
            echo "$output"
            local sub_id
            sub_id=$(echo "$output" | awk '/id:/{print $2; exit}')
            [ -n "$sub_id" ] || { echo "échec: pas d'ID de soumission"; return 1; }
            echo "soumis (id: $sub_id)"

            local deadline=$((SECONDS + timeout))
            while [ $SECONDS -lt $deadline ]; do
              sleep 30
              local info
              info=$(xcrun notarytool info "$sub_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1) || { echo "erreur réseau, on repoll…"; continue; }
              local status
              status=$(echo "$info" | awk '/status:/{print $2; exit}')
              echo "statut: $status"
              case "$status" in
                Accepted) return 0 ;;
                Invalid|Rejected)
                  xcrun notarytool log "$sub_id" \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_ID_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" 2>&1 || true
                  return 1 ;;
              esac
            done
            echo "timeout après $((timeout / 60)) min"
            return 2
          }

          notarize() {
            local zip="$1"
            local backoffs=(300 900 2700)
            for i in 0 1 2; do
              echo "notarisation: tentative $((i + 1))/3"
              notarize_once "$zip" "${backoffs[$i]}" && return 0
              local rc=$?
              [ $rc -eq 2 ] || return $rc   # ne réessaie que sur timeout
            done
            return 1
          }

          for label in macos-aarch64 macos-x86_64; do
            echo "::group::$label"
            work="$RUNNER_TEMP/$label"
            mkdir -p "$work"
            # CLI et module vivent dans deux artefacts distincts, mais une seule
            # soumission de notarisation suffit pour les deux.
            tar xzf "dl/ssign-$label/ssign-$label.tar.gz" -C "$work"
            tar xzf "dl/ssign-pkcs11-$label/ssign-pkcs11-$label.tar.gz" -C "$work"

            for f in ssign libssign_pkcs11.dylib; do
              codesign --force --options runtime \
                --sign "Developer ID Application: Sylvain Gargasson ($APPLE_TEAM_ID)" \
                --timestamp "$work/$f"
              codesign --verify --strict --verbose=2 "$work/$f"
            done

            ditto -c -k --keepParent "$work" "$RUNNER_TEMP/$label.zip"
            notarize "$RUNNER_TEMP/$label.zip" || exit 1

            tar czf "ssign-$label.tar.gz" -C "$work" ssign
            tar czf "ssign-pkcs11-$label.tar.gz" -C "$work" libssign_pkcs11.dylib
            echo "::endgroup::"
          done

      - name: Re-upload the signed macOS aarch64 CLI
        uses: actions/upload-artifact@v7
        with:
          name: ssign-macos-aarch64
          path: ssign-macos-aarch64.tar.gz
          overwrite: true
      - name: Re-upload the signed macOS aarch64 module
        uses: actions/upload-artifact@v7
        with:
          name: ssign-pkcs11-macos-aarch64
          path: ssign-pkcs11-macos-aarch64.tar.gz
          overwrite: true
      - name: Re-upload the signed macOS x86_64 CLI
        uses: actions/upload-artifact@v7
        with:
          name: ssign-macos-x86_64
          path: ssign-macos-x86_64.tar.gz
          overwrite: true
      - name: Re-upload the signed macOS x86_64 module
        uses: actions/upload-artifact@v7
        with:
          name: ssign-pkcs11-macos-x86_64
          path: ssign-pkcs11-macos-x86_64.tar.gz
          overwrite: true

  # Sign the Windows binary with ssign itself (the Linux runner signs the Windows
  # .exe — dogfooding). Gated by the `signing` environment: the run pauses for
  # the owner's approval before it can read the Certum secrets and sign, and the
  # release below waits for it — so a tag becomes: build → approve → signed release.
  sign-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: signing
    steps:
      # Sign ourselves with the exact Linux binary just built in this run — no
      # recompile, and it dogfoods the very version being released.
      - name: Download the freshly built Linux ssign
        uses: actions/download-artifact@v8
        with:
          name: ssign-linux-x86_64
          path: linux
      - name: Install ssign
        run: |
          tar xzf linux/ssign-linux-x86_64.tar.gz -C linux
          sudo install -m755 linux/ssign /usr/local/bin/ssign

      - name: Download the Windows CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: ssign-windows-x86_64
          path: dl
      - name: Download the Windows module artifact
        uses: actions/download-artifact@v8
        with:
          name: ssign-pkcs11-windows-x86_64
          path: dl

      - name: Sign the Windows binary + module with ssign (via Certum)
        env:
          CERTUM_EMAIL: ${{ secrets.CERTUM_EMAIL }}
          CERTUM_OTP: ${{ secrets.CERTUM_OTP }}
        run: |
          unzip -o dl/ssign-windows-x86_64.zip -d dl
          unzip -o dl/ssign-pkcs11-windows-x86_64.zip -d dl
          # One Certum login signs both the CLI and the module.
          ssign --verbose \
            -n "ssign" -u "https://github.com/${{ github.repository }}" \
            dl/ssign.exe dl/ssign_pkcs11.dll
          sudo apt-get update -qq && sudo apt-get install -y osslsigncode
          # Vérifie les faits, pas la présence d'une phrase. « Calculated message
          # digest » apparaît AUSSI quand le digest ne correspond pas, et ne dit
          # rien de l'horodatage : ce contrôle laissait donc passer une signature
          # que Windows aurait rejetée, et des binaires non horodatés — donc
          # invalides dès l'expiration du certificat.
          verify_signature() {
            local out
            out=$(osslsigncode verify "$1" 2>&1) || true
            echo "$out"
            if echo "$out" | grep -q "MISMATCH"; then
              echo "::error::$1 : digest Authenticode invalide (Windows le verrait comme falsifié)"
              return 1
            fi
            if echo "$out" | grep -q "Timestamp is not available"; then
              echo "::error::$1 : signature non horodatée (invalide dès l'expiration du certificat)"
              return 1
            fi
            if ! echo "$out" | grep -q "Signature verification: ok"; then
              echo "::error::$1 : vérification de signature échouée"
              return 1
            fi
          }
          for f in ssign.exe ssign_pkcs11.dll; do
            verify_signature "dl/$f"
          done
          (cd dl && rm -f ssign-windows-x86_64.zip && zip -j ssign-windows-x86_64.zip ssign.exe)
          (cd dl && rm -f ssign-pkcs11-windows-x86_64.zip && zip -j ssign-pkcs11-windows-x86_64.zip ssign_pkcs11.dll)

      - name: Re-upload the signed Windows CLI
        uses: actions/upload-artifact@v7
        with:
          name: ssign-windows-x86_64
          path: dl/ssign-windows-x86_64.zip
          overwrite: true
      - name: Re-upload the signed Windows module
        uses: actions/upload-artifact@v7
        with:
          name: ssign-pkcs11-windows-x86_64
          path: dl/ssign-pkcs11-windows-x86_64.zip
          overwrite: true

  release:
    needs: [build, sign-windows, sign-apple]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      # Download outside the repo working tree so `cargo publish` sees a clean tree.
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          # Tags pré-release (v*-rc/-beta) marqués « pre-release » dans l'UI GitHub.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ runner.temp }}/artifacts/**/*

      - name: Publish to crates.io
        # Pas de publish crates.io sur les pré-releases (v*-rc/-beta) : un publish est
        # définitif. Ces tags ne produisent que binaires signés + Release GitHub.
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          # Publish a crate, tolerating "already exists" (re-tag) but failing on
          # any other error. ssign-pkcs11 is publish=false, so it's skipped.
          publish() {
            if cargo publish -p "$1" 2>&1 | tee /tmp/publish.log; then
              return 0
            elif grep -q "already exists" /tmp/publish.log; then
              echo "$1: this version is already on crates.io — nothing to do"
              return 0
            else
              return 1
            fi
          }
          # The library first; the binary depends on it.
          publish ssign-core || exit 1
          # Wait for the index to catch up before publishing the dependent binary.
          for i in $(seq 1 10); do
            publish ssign && exit 0
            echo "index not ready, retrying in 30s… ($i/10)"
            sleep 30
          done
          echo "failed to publish ssign" >&2
          exit 1
