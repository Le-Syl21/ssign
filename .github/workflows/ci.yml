name: CI

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            lint: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: ${{ matrix.lint && 'rustfmt, clippy' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}

      # aarch64 Linux is cross-compiled from x86_64 (hosted arm runners are too
      # unstable for releases); cross-rs runs the build in a Docker image that
      # ships the aarch64 toolchain. ssign is pure Rust + rustls, so no system
      # packages are needed on any native target.
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      # --- Lint (linux-x86_64 only) ---
      - name: Check formatting
        if: matrix.lint
        run: cargo fmt --check

      - name: Clippy
        if: matrix.lint
        run: cargo clippy --release --target ${{ matrix.target }} -- -D warnings

      # --- Build ---
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # Skip tests for cross-compiled targets (no aarch64 binary runs on the
      # x86_64 host) and the macOS x86_64 build (Apple-silicon runner).
      - name: Run tests
        if: matrix.target != 'x86_64-apple-darwin' && !matrix.cross
        run: cargo test --release --target ${{ matrix.target }}

      - name: Smoke test (--help runs)
        if: matrix.target != 'x86_64-apple-darwin' && !matrix.cross
        run: cargo run --release --target ${{ matrix.target }} -- --help

      # --- Apple signing & notarization (macOS, tags only) ---
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign binary (macOS)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application: Sylvain Gargasson ($APPLE_TEAM_ID)" \
            target/${{ matrix.target }}/release/ssign

      - name: Notarize binary (macOS, tags only)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            target/${{ matrix.target }}/release/ssign "$RUNNER_TEMP/ssign.zip"
          xcrun notarytool submit "$RUNNER_TEMP/ssign.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait

      # --- Package ---
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ssign-${{ matrix.label }}.tar.gz -C target/${{ matrix.target }}/release ssign

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/ssign.exe -DestinationPath ssign-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssign-${{ matrix.label }}
          path: ssign-${{ matrix.label }}.*

  # Sign the Windows binary with ssign itself (the Linux runner signs the Windows
  # .exe — dogfooding). Gated by the `signing` environment: the run pauses for
  # the owner's approval before it can read the Certum secrets and sign, and the
  # release below waits for it — so a tag becomes: build → approve → signed release.
  sign-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build ssign
        run: cargo build --release

      - name: Download the Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ssign-windows-x86_64
          path: dl

      - name: Sign the Windows binary with ssign (via Certum)
        env:
          CERTUM_EMAIL: ${{ secrets.CERTUM_EMAIL }}
          CERTUM_OTP: ${{ secrets.CERTUM_OTP }}
        run: |
          unzip -o dl/ssign-windows-x86_64.zip -d dl
          ./target/release/ssign --verbose \
            -n "ssign" -u "https://github.com/${{ github.repository }}" \
            dl/ssign.exe
          sudo apt-get update -qq && sudo apt-get install -y osslsigncode
          osslsigncode verify dl/ssign.exe 2>&1 | tee verify.txt || true
          grep -q "Calculated message digest" verify.txt
          (cd dl && rm -f ssign-windows-x86_64.zip && zip -j ssign-windows-x86_64.zip ssign.exe)

      - name: Re-upload the signed Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssign-windows-x86_64
          path: dl/ssign-windows-x86_64.zip
          overwrite: true

  release:
    needs: [build, sign-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Download outside the repo working tree so `cargo publish` sees a clean tree.
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ runner.temp }}/artifacts/**/*

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish
