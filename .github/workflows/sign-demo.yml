name: Sign demo

# Proves the whole thing end to end: build ssign, then use it to Authenticode-sign
# a hello-world PE with the real Certum SimplySign cloud certificate.
# Manual only — each run performs a real cloud login + signature.

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ssign
        run: cargo build --release

      - name: Sign a hello-world exe with Certum (via ssign)
        env:
          CERTUM_EMAIL: ${{ secrets.CERTUM_USERID }}
          CERTUM_OTP: ${{ secrets.CERTUM_TOTP }}
        run: |
          cp tests/fixtures/hello.exe hello.exe
          ./target/release/ssign --verbose \
            -n "ssign demo" -u "https://github.com/Le-Syl21/certum" \
            hello.exe

      - name: Verify the Authenticode signature
        run: |
          sudo apt-get update -qq && sudo apt-get install -y osslsigncode
          osslsigncode verify hello.exe || true
          # Assert the signature is structurally valid (PE hash matches) and was
          # issued to the expected subject.
          osslsigncode verify hello.exe 2>&1 | tee verify.txt
          grep -q "Calculated message digest" verify.txt
          grep -qi "GARGASSON" verify.txt
          # The chain includes the Certum intermediate…
          grep -qi "Certum Code Signing 2021 CA" verify.txt
          # …and the RFC3161 timestamp token is embedded (osslsigncode's own
          # verify only surfaces the legacy form, so assert on the structure).
          osslsigncode extract-signature -in hello.exe -out sig.der
          openssl asn1parse -inform DER -in sig.der | grep -qi "timeStampToken"

      - name: Upload the signed exe
        uses: actions/upload-artifact@v4
        with:
          name: hello-signed
          path: hello.exe
