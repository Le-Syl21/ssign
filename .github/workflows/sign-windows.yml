name: Sign Windows release

# Take the Windows binary from a published Release, Authenticode-sign it with
# ssign itself (the Linux build signs the Windows .exe — dogfooding), and push
# the signed asset back. Manual + gated: each run performs a real Certum cloud
# signature, so it waits for the `signing` environment's required reviewers.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose ssign-windows-x86_64.zip to sign (e.g. v0.1.0)"
        required: true

jobs:
  sign:
    runs-on: ubuntu-latest
    environment: signing        # owner approval + scoped Certum secrets
    permissions:
      contents: write           # to replace the release asset
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build ssign
        run: cargo build --release

      - name: Download the Windows asset from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.tag }}" -R "$GITHUB_REPOSITORY" \
            --pattern 'ssign-windows-x86_64.zip' --dir dl
          unzip -o dl/ssign-windows-x86_64.zip -d dl

      - name: Sign ssign.exe with ssign (via Certum)
        env:
          CERTUM_EMAIL: ${{ secrets.CERTUM_EMAIL }}
          CERTUM_OTP: ${{ secrets.CERTUM_OTP }}
        run: |
          ./target/release/ssign --verbose \
            -n "ssign" -u "https://github.com/${{ github.repository }}" \
            dl/ssign.exe

      - name: Verify the Authenticode signature
        run: |
          sudo apt-get update -qq && sudo apt-get install -y osslsigncode
          osslsigncode verify dl/ssign.exe 2>&1 | tee verify.txt || true
          grep -q "Calculated message digest" verify.txt

      - name: Re-zip and push the signed asset back to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          (cd dl && zip -j ../ssign-windows-x86_64.zip ssign.exe)
          gh release upload "${{ inputs.tag }}" ssign-windows-x86_64.zip \
            -R "$GITHUB_REPOSITORY" --clobber
